[[redirects]]
	from = "/api/auth/google"
	to = "/.netlify/functions/google-auth"
	status = 200
	force = true

[[redirects]]
	from = "/api/auth/google/callback"
	to = "/.netlify/functions/google-auth-callback"
	status = 200
	force = true
[build]
	publish = "dist/public"
	command = "pnpm build"

[dev]
	publish = "dist/public"
	port = 8888

[[redirects]]
	from = "/api/trpc/*"
	to = "/.netlify/functions/server"
	status = 200
	force = true